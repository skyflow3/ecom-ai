# WHY: Local development + production reference for Coolify
# Coolify uses this as a template for its own docker-compose generation.
#
# Services:
#   web    — Next.js app (port 3000) — dashboard + API routes
#   worker — BullMQ job processor (page generation, deploy, A/B evaluation, pattern codify)
#   router — Express variant router (port 3001) — funnel pages + A/B routing
#   redis  — BullMQ queue backend + rate limiting
#   db     — PostgreSQL database
#
# Nginx (managed by Coolify):
#   *.nutrovia.co       → router:3001 (funnel pages)
#   nutrovia.co/api/*   → web:3000    (API routes)
#   nutrovia.co/*       → web:3000    (dashboard)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # WHY: Shared volume for funnel HTML — both web and router read from here
      - funnel-data:/app/public/funnels
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # WHY: Worker writes generated HTML to the shared volume
      - funnel-data:/data/funnels
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # WHY: Router reads funnel HTML from shared volume
      - funnel-data:/data/funnels
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecom_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom_ai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ecom_ai}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecom_ai}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis-data:
  pg-data:
  funnel-data:
