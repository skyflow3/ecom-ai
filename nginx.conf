# WHY: Nginx reverse proxy — aligned with Architecture Finale.md §12
#
# Architecture (from Architecture Finale.md §12):
#   *.nutrovia.co → Nginx → router:3001 (Express variant router — funnel pages + A/B)
#   nutrovia.co/api/* → Nginx → web:3000 (Next.js — API routes)
#   nutrovia.co/* → Nginx → web:3000 (Next.js — dashboard, auth, etc.)
#
# Key decisions:
#   - Static assets (.js, .css, .png, etc.) served DIRECTLY by Nginx from /data/funnels
#   - Only HTML page requests go through the variant router
#   - Nginx extracts subdomain and passes via X-Funnel-Slug header
#
# DNS requirement: Wildcard A record *.nutrovia.co → server IP
# SSL requirement: Wildcard cert (*.nutrovia.co) via Let's Encrypt DNS challenge or Cloudflare

# ── Upstreams ──────────────────────────────────────────────────────────────────

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream variant_router {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── Rate Limiting ──────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=funnel:10m rate=100r/s;

# ── Shared Proxy Config ───────────────────────────────────────────────────────

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Request-ID $request_id;

# ── Server Block 1: HTTP → HTTPS Redirect ─────────────────────────────────────

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Server Block 2: Funnel Subdomains (*.nutrovia.co) ─────────────────────────
# WHY: Architecture Finale.md §12 — each funnel gets its own subdomain.
#      Nginx extracts subdomain via regex, passes as X-Funnel-Slug to variant router.
#      Static assets served directly by Nginx from /data/funnels volume.

server {
    listen 443 ssl http2;
    server_name ~^(?<slug>[a-z0-9-]+)\.nutrovia\.co$;

    # WHY: Must NOT match app.nutrovia.co, api.nutrovia.co, etc.
    if ($slug ~ ^(app|api|admin|cdn|t|mail|www|staging)$) {
        return 444;  # Close connection for reserved subdomains
    }

    ssl_certificate     /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # ── Static Assets (served directly by Nginx, cache 1 year) ──
    # WHY: Architecture Finale.md §12 — Nginx serves assets directly from /data/funnels
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webp|mp4|webm)$ {
        root /data/funnels;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Tracking (high-volume, no logging) ──
    location = /track {
        limit_req zone=funnel burst=200 nodelay;
        proxy_pass http://variant_router;
        proxy_set_header X-Funnel-Slug $slug;
        access_log off;
    }

    # ── Funnel HTML pages (via Variant Router, cache 5 min) ──
    # WHY: Architecture Finale.md §12 — HTML routing goes through Express variant router
    #      for cookie-based A/B testing. Assets bypass the router entirely.
    location / {
        limit_req zone=funnel burst=50 nodelay;
        proxy_pass http://variant_router;
        # WHY: Architecture Finale.md §12 — pass subdomain as X-Funnel-Slug header
        proxy_set_header X-Funnel-Slug $slug;
        add_header Cache-Control "public, max-age=300";
    }
}

# ── Server Block 3: Main App + API (nutrovia.co, app.nutrovia.co) ──────────────

server {
    listen 443 ssl http2;
    server_name nutrovia.co app.nutrovia.co;

    ssl_certificate     /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # ── Next.js Static Assets (cache 1 year) ──
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, immutable";
    }

    # ── Webhooks (no rate limiting — Stripe/Clerk control retries) ──
    location /api/webhooks/ {
        proxy_pass http://nextjs;
        client_max_body_size 10m;
    }

    # ── Tracking Pixel (ultra-fast, no logging) ──
    location /api/track {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://nextjs;
        access_log off;
    }

    # ── API Routes (moderate rate limiting) ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nextjs;
        client_max_body_size 10m;
    }

    # ── Auth Routes (strict rate limiting) ──
    location ~ ^/(sign-in|sign-up) {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://nextjs;
    }

    # ── Everything Else (dashboard, pages, etc.) ──
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
